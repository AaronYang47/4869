<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4869 — Choose language / 选择语言</title>
    <link rel="icon" type="image/png" href="images/logo.png">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-atmosphere"></div>
    <section class="hero" style="min-height:100vh">
        <div>
            <div class="hero-badge"><span class="dot"></span>4869</div>
            <h1>Choose your language.<br><span class="gradient">选择你的语言。</span></h1>
            <p class="hero-desc" id="status">Detecting your region… / 正在检测所在地区……</p>
            <div class="hero-actions">
                <button class="btn btn-primary" type="button" onclick="choose('zh')">中文</button>
                <button class="btn btn-secondary" type="button" onclick="choose('en')">English</button>
            </div>
            <p style="margin-top:24px;color:var(--text-tertiary);font-size:12px;max-width:620px">Automatic selection requests only a country code from api.country.is. Your manual choice is stored in this browser and always takes priority.<br>自动选择仅向 api.country.is 请求国家代码；手动选择会保存在当前浏览器中，并始终优先。</p>
        </div>
    </section>
    <script>
        const base = location.pathname.replace(/\/[^/]*$/, '/');
        const destination = lang => base + (lang === 'zh' ? 'zh/' : 'en/');
        function choose(lang) {
            localStorage.setItem('4869-language', lang);
            location.replace(destination(lang));
        }
        const queryLanguage = new URLSearchParams(location.search).get('lang');
        if (queryLanguage === 'zh' || queryLanguage === 'en') choose(queryLanguage);
        else {
            const saved = localStorage.getItem('4869-language');
            if (saved === 'zh' || saved === 'en') choose(saved);
            else {
                const fallback = () => choose((navigator.languages || [navigator.language || '']).some(x => /^zh\b/i.test(x)) ? 'zh' : 'en');
                const timeout = setTimeout(fallback, 1800);
                fetch('https://api.country.is/', {cache: 'no-store'})
                    .then(response => response.ok ? response.json() : Promise.reject())
                    .then(data => {
                        clearTimeout(timeout);
                        choose(['CN', 'HK', 'MO'].includes(String(data.country || '').toUpperCase()) ? 'zh' : 'en');
                    })
                    .catch(() => { clearTimeout(timeout); fallback(); });
            }
        }
    </script>
</body>
</html>
